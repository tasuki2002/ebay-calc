<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
    --gold: #f0c040; --green: #5ddb5d; --red: #e05555;
    --muted: #666; --input-bg: #111;
  }
  html, body {
    background: var(--bg); color: #e8e8e8;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }
  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .reset-btn {
    background: #222; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-size: 13px; padding: 7px 14px; cursor: pointer;
  }
  .reset-btn:active { background: #333; }

  .profit-banner {
    background: var(--card); border-bottom: 3px solid var(--border);
    padding: 18px 16px; text-align: center; transition: border-color 0.3s;
  }
  .profit-banner.positive { border-color: var(--gold); }
  .profit-banner.negative { border-color: var(--red); }

  .profit-main {
    font-size: 52px; font-weight: 800; letter-spacing: -0.04em;
    line-height: 1; color: var(--muted); transition: color 0.3s;
  }
  .profit-main.positive { color: var(--gold); }
  .profit-main.negative { color: var(--red); }

  .profit-row2 {
    display: flex; justify-content: center; align-items: center;
    gap: 10px; margin-top: 8px; flex-wrap: wrap;
  }
  .profit-usd { font-size: 14px; color: var(--muted); }
  .verdict {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
  }
  .verdict.buy  { background: #1e3a1e; color: var(--green); }
  .verdict.pass { background: #3a1e1e; color: var(--red); }
  .verdict.check{ background: #2a2a1a; color: var(--gold); }

  .scroll-area { padding: 12px 12px 48px; }

  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 12px; overflow: hidden;
  }
  .section-header {
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted);
    text-transform: uppercase; padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }
  .input-row {
    display: flex; align-items: center; padding: 0 16px;
    border-bottom: 1px solid #1e1e1e; min-height: 62px;
  }
  .input-row:last-child { border-bottom: none; }
  .input-label { font-size: 13px; color: #aaa; flex: 1; padding-right: 8px; }
  .input-label small { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .input-right { display: flex; align-items: center; gap: 6px; }
  input[type="number"] {
    background: var(--input-bg); border: 1px solid #333; border-radius: 10px;
    color: #fff; font-size: 20px; font-weight: 700;
    padding: 10px 12px; width: 120px; text-align: right; outline: none;
    -moz-appearance: textfield; -webkit-appearance: none; appearance: none;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { border-color: var(--gold); background: #161616; }
  .unit { font-size: 12px; color: var(--muted); min-width: 26px; }

  .shipping-pair { display: flex; border-bottom: 1px solid #1e1e1e; }
  .shipping-col {
    flex: 1; padding: 12px 10px;
    border-right: 1px solid #1e1e1e;
  }
  .shipping-col:last-child { border-right: none; }
  .shipping-col label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 6px; }
  .shipping-col .input-right { justify-content: flex-end; }
  .shipping-col input[type="number"] { width: 88px; font-size: 17px; }

  .breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 16px; border-bottom: 1px solid #1e1e1e; font-size: 13px;
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { color: #999; }
  .breakdown-val { font-weight: 600; }
  .breakdown-val.neg { color: var(--red); }

  .bar-section { padding: 14px 16px; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .bar-track { background: #111; border-radius: 6px; height: 10px; overflow: hidden; }
  .bar-fill {
    height: 100%; border-radius: 6px; transition: width 0.35s ease, background 0.35s;
    background: linear-gradient(90deg, var(--gold), #f0a020); width: 0%;
  }
  .bar-fill.over   { background: linear-gradient(90deg, var(--green), #3db83d); }
  .bar-fill.danger { background: linear-gradient(90deg, var(--red), #c03333); }
  .footnote { font-size: 10px; color: #444; text-align: center; padding: 4px 16px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">eBay <span>利益計算</span></div>
    <div class="header-sub">Oracle せどり戦略室</div>
  </div>
  <button class="reset-btn" onclick="resetAll()">リセット</button>
</div>

<div class="profit-banner" id="profit-banner">
  <div class="profit-main" id="profitJpy">－</div>
  <div class="profit-row2">
    <span class="profit-usd" id="profitUsd">仕入れ値と売価を入力</span>
    <span id="verdict"></span>
  </div>
</div>

<div class="scroll-area">

  <div class="section">
    <div class="section-header">仕入れ・売価</div>
    <div class="input-row">
      <div class="input-label">仕入れ値</div>
      <div class="input-right">
        <input type="number" id="cost" inputmode="numeric" placeholder="15000" oninput="calc()">
        <span class="unit">円</span>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">
        eBay売価
        <small id="priceJpyPreview" style="color:#f0c040;font-size:11px;margin-top:2px;display:block;">－ 円</small>
      </div>
      <div class="input-right">
        <input type="number" id="priceUsd" inputmode="decimal" placeholder="200" oninput="calc()">
        <span class="unit">USD</span>
      </div>
    </div>
    <div class="input-row">
      <div class="input-label">
        為替レート
        <small>変更可</small>
      </div>
      <div class="input-right">
        <input type="number" id="rate" inputmode="decimal" value="155" oninput="calc()">
        <span class="unit">円/USD</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">手数料・送料</div>
    <div class="input-row">
      <div class="input-label">
        eBay手数料
        <small>ストアあり≒13% / なし≒17〜20%</small>
      </div>
      <div class="input-right">
        <input type="number" id="feeRate" inputmode="decimal" value="17" oninput="calc()">
        <span class="unit">%</span>
      </div>
    </div>
    <div class="shipping-pair">
      <div class="shipping-col">
        <label>送料（USD）</label>
        <div class="input-right">
          <input type="number" id="shippingUsd" inputmode="decimal" placeholder="30">
          <span class="unit">$</span>
        </div>
      </div>
      <div class="shipping-col">
        <label>送料（円）</label>
        <div class="input-right">
          <input type="number" id="shippingJpy" inputmode="numeric" placeholder="4500">
          <span class="unit">円</span>
        </div>
      </div>
    </div>
    <div class="footnote" style="padding:8px 16px;">どちらか一方を入力 → 自動換算</div>
  </div>

  <div class="section">
    <div class="section-header">内訳</div>
    <div class="breakdown-row">
      <span class="breakdown-label">売価（円換算）</span>
      <span class="breakdown-val" id="r-priceJpy">－</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">eBay手数料</span>
      <span class="breakdown-val neg" id="r-fee">－</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">送料</span>
      <span class="breakdown-val neg" id="r-shipping">－</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">仕入れ値</span>
      <span class="breakdown-val neg" id="r-cost">－</span>
    </div>
    <div class="breakdown-row">
      <span class="breakdown-label">損益分岐点</span>
      <span class="breakdown-val" id="r-breakeven">－</span>
    </div>
  </div>

  <div class="section">
    <div class="bar-section">
      <div class="bar-meta">
        <span>損益分岐に対する売価の割合</span>
        <span id="bar-pct">－</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill"></div>
      </div>
    </div>
  </div>

  <div class="footnote">手数料はストア有無・カテゴリ・売上規模で変動します</div>
</div>

<script>
  let shippingSource = null;
  function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

  document.getElementById('shippingUsd').addEventListener('input', function() {
    shippingSource = this.value !== '' ? 'usd' : null;
    syncShipping(); calc();
  });
  document.getElementById('shippingJpy').addEventListener('input', function() {
    shippingSource = this.value !== '' ? 'jpy' : null;
    syncShipping(); calc();
  });

  function syncShipping() {
    const rate = parseFloat(document.getElementById('rate').value) || 155;
    if (shippingSource === 'usd') {
      const usd = parseFloat(document.getElementById('shippingUsd').value) || 0;
      document.getElementById('shippingJpy').value = usd ? Math.round(usd * rate) : '';
    } else if (shippingSource === 'jpy') {
      const jpy = parseFloat(document.getElementById('shippingJpy').value) || 0;
      document.getElementById('shippingUsd').value = jpy ? (jpy / rate).toFixed(0) : '';
    }
  }

  function resetAll() {
    ['cost','priceUsd','shippingUsd','shippingJpy'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('rate').value = '155';
    document.getElementById('feeRate').value = '17';
    shippingSource = null;
    calc();
  }

  function calc() {
    const rate     = parseFloat(document.getElementById('rate').value) || 155;
    const cost     = parseFloat(document.getElementById('cost').value) || 0;
    const priceUsd = parseFloat(document.getElementById('priceUsd').value) || 0;
    const feeRate  = parseFloat(document.getElementById('feeRate').value) || 17;
    syncShipping();
    const shippingJpy = parseFloat(document.getElementById('shippingJpy').value) || 0;

    const banner   = document.getElementById('profit-banner');
    const profitEl = document.getElementById('profitJpy');

    // 売価の円換算プレビュー
    const priceJpyPreview = document.getElementById('priceJpyPreview');
    if (priceUsd) {
      priceJpyPreview.textContent = '≈ ' + fmt(Math.round(priceUsd * rate)) + ' 円';
    } else {
      priceJpyPreview.textContent = '－ 円';
    }

    if (!priceUsd || !cost) {
      profitEl.textContent = '－'; profitEl.className = 'profit-main';
      banner.className = 'profit-banner';
      document.getElementById('profitUsd').textContent = '仕入れ値と売価を入力';
      document.getElementById('verdict').innerHTML = '';
      document.getElementById('bar-pct').textContent = '－';
      document.getElementById('bar-fill').style.width = '0%';
      ['r-priceJpy','r-fee','r-shipping','r-cost','r-breakeven'].forEach(id => document.getElementById(id).textContent = '－');
      return;
    }

    const priceJpy  = Math.round(priceUsd * rate);
    const fee       = Math.round(priceJpy * feeRate / 100);
    const profit    = priceJpy - fee - shippingJpy - cost;
    const profitUsd = (profit / rate).toFixed(0);
    const breakeven = cost + fee + shippingJpy;
    const pct       = breakeven > 0 ? Math.round((priceJpy / breakeven) * 100) : 0;

    profitEl.textContent = profit >= 0 ? `¥${fmt(profit)}` : `-¥${fmt(Math.abs(profit))}`;
    profitEl.className   = `profit-main ${profit > 0 ? 'positive' : profit < 0 ? 'negative' : ''}`;
    banner.className     = `profit-banner ${profit > 0 ? 'positive' : profit < 0 ? 'negative' : ''}`;
    document.getElementById('profitUsd').textContent = `≈ $${profitUsd}`;

    const profitRate = cost > 0 ? profit / cost : 0;
    let vHtml = '';
    if (profit > 0 && profitRate >= 0.2)      vHtml = '<span class="verdict buy">✓ 仕入れGO</span>';
    else if (profit > 0 && profitRate >= 0.05) vHtml = '<span class="verdict check">△ 要検討</span>';
    else                                        vHtml = '<span class="verdict pass">✕ パス</span>';
    document.getElementById('verdict').innerHTML = vHtml;

    document.getElementById('r-priceJpy').textContent  = `¥${fmt(priceJpy)}（$${fmt(priceUsd)}）`;
    document.getElementById('r-fee').textContent       = `-¥${fmt(fee)}`;
    document.getElementById('r-shipping').textContent  = shippingJpy ? `-¥${fmt(shippingJpy)}` : '－';
    document.getElementById('r-cost').textContent      = `-¥${fmt(cost)}`;
    document.getElementById('r-breakeven').textContent = `¥${fmt(breakeven)}`;

    const fill = document.getElementById('bar-fill');
    fill.style.width = `${Math.min(pct, 100)}%`;
    fill.className = `bar-fill ${profit > 0 ? 'over' : 'danger'}`;
    document.getElementById('bar-pct').textContent = `${pct}%`;
  }
</script>
</body>
</html>
