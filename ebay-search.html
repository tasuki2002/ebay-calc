<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>eBay 検索ワード変換</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --card: #141414;
  --border: #242424;
  --gold: #f0c040;
  --gold2: #d4a820;
  --green: #4ade80;
  --red: #f87171;
  --muted: #555;
  --text: #e8e8e8;
  --subtext: #888;
  --input-bg: #0f0f0f;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
}

/* ヘッダー */
.header {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.95);
  position: sticky;
  top: 0;
  z-index: 10;
  backdrop-filter: blur(12px);
}

.header-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: #fff;
}

.header-title span { color: var(--gold); }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.05em; }

/* メインエリア */
.main { padding: 16px; max-width: 600px; margin: 0 auto; }

/* 入力カード */
.input-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
}

.input-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.input-wrapper {
  position: relative;
  display: flex;
  gap: 8px;
  align-items: center;
}

input[type="text"] {
  flex: 1;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 18px;
  font-weight: 600;
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
  -webkit-appearance: none;
}

input[type="text"]:focus { border-color: var(--gold); }
input[type="text"]::placeholder { color: var(--muted); font-weight: 400; font-size: 16px; }

.clear-btn {
  background: #222;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-size: 13px;
  padding: 10px 14px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}

.clear-btn:active { background: #333; }

/* 変換ボタン */
.convert-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: 14px;
  color: #000;
  font-size: 16px;
  font-weight: 800;
  padding: 16px;
  cursor: pointer;
  margin-top: 14px;
  letter-spacing: 0.03em;
  transition: background 0.2s, transform 0.1s;
}

.convert-btn:active { background: var(--gold2); transform: scale(0.98); }
.convert-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

/* ローディング */
.loading {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 13px;
  display: none;
}

.loading-dot {
  display: inline-block;
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* 結果カード */
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 12px;
  display: none;
}

.result-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.result-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
}

.copy-all-btn {
  background: #222;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--subtext);
  font-size: 11px;
  padding: 5px 10px;
  cursor: pointer;
}

.copy-all-btn:active { background: #333; }

/* 検索ワードリスト */
.search-items { padding: 8px 0; }

.search-item {
  padding: 12px 16px;
  border-bottom: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.search-item:last-child { border-bottom: none; }
.search-item:active { background: #1e1e1e; }

.item-badge {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 5px;
  flex-shrink: 0;
  font-weight: 700;
}

.badge-main { background: #1a2a1a; color: var(--green); }
.badge-sold { background: #1a1a2a; color: #818cf8; }
.badge-junk { background: #2a1a1a; color: var(--red); }
.badge-cib  { background: #2a2a1a; color: var(--gold); }

.item-text {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  word-break: break-all;
}

.item-action {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.btn-copy, .btn-ebay {
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 10px;
  cursor: pointer;
  border: none;
  white-space: nowrap;
}

.btn-copy {
  background: #222;
  color: var(--subtext);
  border: 1px solid var(--border);
}

.btn-copy:active { background: #333; }
.btn-copy.copied { background: #1a2a1a; color: var(--green); border-color: #1e3a1e; }

.btn-ebay {
  background: var(--gold);
  color: #000;
}

.btn-ebay:active { background: var(--gold2); }

/* エラー */
.error-msg {
  background: #2a1a1a;
  border: 1px solid #3a1a1a;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--red);
  display: none;
  margin-bottom: 12px;
}

/* 使い方 */
.help-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
}

.help-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.help-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.example-chip {
  background: #1a1a1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--subtext);
  cursor: pointer;
  transition: all 0.15s;
}

.example-chip:active { background: #222; color: var(--text); }

.footnote {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  padding: 8px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">eBay <span>検索変換</span></div>
  <div class="header-sub">Oracle せどり戦略室 — 日本語 → eBay英語</div>
</div>

<div class="main">

  <!-- 入力 -->
  <div class="input-card">
    <div class="input-label">商品名を日本語で入力</div>
    <div class="input-wrapper">
      <input type="text" id="queryInput" placeholder="例：ニコン レンズ 単焦点" inputmode="text">
      <button class="clear-btn" onclick="clearInput()">クリア</button>
    </div>
    <button class="convert-btn" id="convertBtn" onclick="convert()">変換してeBayで検索 →</button>
  </div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <span class="loading-dot">●</span>&nbsp;
    <span class="loading-dot" style="animation-delay:0.2s">●</span>&nbsp;
    <span class="loading-dot" style="animation-delay:0.4s">●</span>
    <div style="margin-top:8px;">変換中...</div>
  </div>

  <!-- エラー -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 結果 -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-label">検索ワード候補</div>
      <button class="copy-all-btn" onclick="copyAll()">全コピー</button>
    </div>
    <div class="search-items" id="searchItems"></div>
  </div>

  <!-- 使い方 -->
  <div class="help-card">
    <div class="help-title">よく使う入力例（タップで入力）</div>
    <div class="help-examples">
      <div class="example-chip" onclick="setExample('ニコン Zレンズ 85mm')">ニコン Zレンズ 85mm</div>
      <div class="example-chip" onclick="setExample('キャノン EFレンズ')">キャノン EFレンズ</div>
      <div class="example-chip" onclick="setExample('New 3DS XL ピカチュウ')">New 3DS XL ピカチュウ</div>
      <div class="example-chip" onclick="setExample('BOSS エフェクター 日本製')">BOSS エフェクター 日本製</div>
      <div class="example-chip" onclick="setExample('カメラレンズ ジャンク')">カメラレンズ ジャンク</div>
      <div class="example-chip" onclick="setExample('ゲームボーイ 本体')">ゲームボーイ 本体</div>
      <div class="example-chip" onclick="setExample('プレイステーション 周辺機器')">プレイステーション 周辺機器</div>
      <div class="example-chip" onclick="setExample('BOSSマルチエフェクター')">BOSSマルチエフェクター</div>
    </div>
  </div>

  <div class="footnote">
    「稼働品」「ジャンク」「CIB」「Sold」など用途別に複数の検索ワードを生成します<br>
    eBayボタンで直接検索画面に飛べます
  </div>

</div>

<script>
const SYSTEM_PROMPT = `あなたはeBay輸出せどりの専門家です。
ユーザーが日本語で商品名を入力したら、eBayで実際に使える英語の検索ワードを複数生成してください。

以下のJSON形式のみで返答してください（マークダウンや説明文は一切不要）：
{
  "items": [
    {"type": "main", "label": "稼働品", "query": "検索ワード"},
    {"type": "sold", "label": "実売確認", "query": "検索ワード sold"},
    {"type": "junk", "label": "ジャンク", "query": "検索ワード for parts"},
    {"type": "cib", "label": "箱付き", "query": "検索ワード CIB complete"}
  ]
}

ルール：
- queryはeBayの検索窓にそのまま入れられる英語のみ
- 型番・モデル名・ブランド名は正確に英語で
- 「Made in Japan」「Japan」「Japanese」などのキーワードを適切に含める
- ジャンクは「for parts or not working」「junk」など
- 実売確認用はSold Itemsで使えるワード
- 商品の特性に応じてCIB・Loose・MIJなどを適宜追加
- 最大6アイテムまで。商品に合わせて適切な数を返す
- JSONのみ返す。前後に文字は一切入れない`;

async function convert() {
  const query = document.getElementById('queryInput').value.trim();
  if (!query) return;

  const btn = document.getElementById('convertBtn');
  const loading = document.getElementById('loading');
  const resultCard = document.getElementById('resultCard');
  const errorMsg = document.getElementById('errorMsg');

  btn.disabled = true;
  loading.style.display = 'block';
  resultCard.style.display = 'none';
  errorMsg.style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: query }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResults(parsed.items);
    resultCard.style.display = 'block';

  } catch (err) {
    errorMsg.textContent = '変換に失敗しました。もう一度試してください。';
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function renderResults(items) {
  const container = document.getElementById('searchItems');
  container.innerHTML = '';

  const badgeMap = {
    main: { cls: 'badge-main', label: '稼働品' },
    sold: { cls: 'badge-sold', label: '実売確認' },
    junk: { cls: 'badge-junk', label: 'ジャンク' },
    cib:  { cls: 'badge-cib',  label: '箱付き' },
  };

  items.forEach((item, i) => {
    const badge = badgeMap[item.type] || { cls: 'badge-main', label: item.label };
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = `
      <span class="item-badge ${badge.cls}">${item.label || badge.label}</span>
      <span class="item-text">${item.query}</span>
      <div class="item-action">
        <button class="btn-copy" id="copy-${i}" onclick="copyItem('${item.query.replace(/'/g, "\\'")}', ${i})">コピー</button>
        <button class="btn-ebay" onclick="searchEbay('${item.query.replace(/'/g, "\\'")}')">検索</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function searchEbay(query) {
  const url = `https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(query)}&LH_Sold=1&LH_Complete=1`;
  window.open(url, '_blank');
}

function copyItem(text, idx) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-${idx}`);
    btn.textContent = 'コピー済';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyAll() {
  const items = document.querySelectorAll('.item-text');
  const text = Array.from(items).map(el => el.textContent).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = 'コピー済！';
    setTimeout(() => { btn.textContent = '全コピー'; }, 2000);
  });
}

function clearInput() {
  document.getElementById('queryInput').value = '';
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('queryInput').focus();
}

function setExample(text) {
  document.getElementById('queryInput').value = text;
  convert();
}

// Enterキーで変換
document.getElementById('queryInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') convert();
});
</script>
</body>
</html>
